services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped
    # extra_hosts:
    #     - "${ARCANE_AGENT_HOST:?missing}:${ARCANE_AGENT_IP:?missing}"
    env_file:
      - .env
    ports:
      - 3552:3552
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - arcane-data:/app/data
    networks:
      - holonet
volumes:
  arcane-data:
    name: arcane-data
    driver: local
networks:
  holonet:
    external: true
